name: wm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-weather_db}
      POSTGRES_USER: ${DB_USER:-weather_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-weather_pass}
      TZ: ${TZ:-Europe/Berlin}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-weather_user} -d ${DB_NAME:-weather_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse:26.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CH_DATABASE:-weather}
      CLICKHOUSE_USER: ${CH_USER:-weather}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-weather}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: ${TZ:-Europe/Berlin}
    ports:
      - "${CH_PORT:-9000}:9000"
      - "${CH_HTTP_PORT:-8123}:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8059}:8059"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-weather_user}
      DB_PASSWORD: ${DB_PASSWORD:-weather_pass}
      DB_NAME: ${DB_NAME:-weather_db}
      DB_SSLMODE: ${DB_SSLMODE:-disable}
      CH_HOST: clickhouse
      CH_PORT: 9000
      CH_USER: ${CH_USER:-weather}
      CH_PASSWORD: ${CH_PASSWORD:-weather}
      CH_DATABASE: ${CH_DATABASE:-weather}
      SERVER_PORT: 8059
      SERVER_ALLOWED_ORIGINS: ${SERVER_ALLOWED_ORIGINS:-http://localhost:8059}
      TZ: ${TZ:-Europe/Berlin}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8059/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local

networks:
  internal:
    driver: bridge
